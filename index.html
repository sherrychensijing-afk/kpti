<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KPTI - K-Pop Trainee Identity</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0b1a;--panel:#1a1730;--text:#e8e0f0;--dim:#9b8fb8;
  --accent:#e94d9a;--accent2:#a855f7;--accent3:#6366f1;
  --grad:linear-gradient(135deg,#e94d9a,#a855f7,#6366f1);
  --grad2:linear-gradient(135deg,#f472b6,#c084fc);
  --R:20px;--shadow:0 8px 32px rgba(233,77,154,.15);
}
body{
  font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 20% 50%,rgba(233,77,154,.08) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 20%,rgba(168,85,247,.08) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 80%,rgba(99,102,241,.06) 0%,transparent 50%);
}
.shell{max-width:520px;margin:0 auto;padding:20px 16px;position:relative;z-index:1}
.screen{display:none}.screen.active{display:block;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* INTRO */
.intro-card{text-align:center;padding:60px 24px 40px}
.intro-logo{font-size:64px;margin-bottom:12px;animation:float 3s ease-in-out infinite}
.intro-title{font-size:42px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px;margin-bottom:4px}
.intro-sub{font-size:14px;color:var(--dim);letter-spacing:3px;margin-bottom:28px}
.intro-desc{background:var(--panel);border:1px solid rgba(233,77,154,.15);border-radius:var(--R);padding:24px;margin-bottom:32px;text-align:left;font-size:14.5px;line-height:1.8;color:var(--dim)}
.intro-desc strong{color:var(--accent)}
.tag{display:inline-block;background:linear-gradient(135deg,rgba(233,77,154,.15),rgba(168,85,247,.15));border:1px solid rgba(233,77,154,.2);border-radius:8px;padding:2px 8px;font-size:12px;color:#f0a0cc;margin:2px}
.btn-main{width:100%;padding:18px;border:none;border-radius:16px;font-size:18px;font-weight:700;color:#fff;background:var(--grad);cursor:pointer;transition:all .3s;box-shadow:var(--shadow);letter-spacing:1px}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(233,77,154,.3)}
.btn-main:active{transform:scale(.98)}
.intro-note{margin-top:20px;font-size:12px;color:var(--dim);opacity:.6}

/* TEST */
.progress-wrap{position:sticky;top:0;z-index:100;background:rgba(13,11,26,.92);backdrop-filter:blur(12px);padding:16px 0 12px;margin-bottom:12px}
.progress-bar{height:6px;background:rgba(233,77,154,.1);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--grad);border-radius:3px;transition:width .4s ease;width:0%}
.progress-text{text-align:center;font-size:13px;color:var(--dim);margin-top:8px}
.progress-text span{color:var(--accent);font-weight:700}
.q-card{background:var(--panel);border:1px solid rgba(233,77,154,.08);border-radius:var(--R);padding:24px 20px;margin-bottom:16px;transition:all .3s}
.q-card.answered{border-color:rgba(233,77,154,.25);background:linear-gradient(135deg,rgba(26,23,48,1),rgba(35,31,66,.8))}
.q-num{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:10px;letter-spacing:1px}
.q-text{font-size:16px;font-weight:500;line-height:1.7;margin-bottom:18px}
.q-options{display:flex;flex-direction:column;gap:10px}
.q-opt{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:14px;border:1.5px solid rgba(233,77,154,.1);background:rgba(13,11,26,.5);cursor:pointer;transition:all .25s;font-size:14.5px;line-height:1.5;color:var(--dim)}
.q-opt:hover{border-color:rgba(233,77,154,.3);background:rgba(233,77,154,.06);color:var(--text)}
.q-opt input{display:none}
.radio-dot{width:20px;height:20px;min-width:20px;border-radius:50%;border:2px solid rgba(233,77,154,.3);position:relative;transition:all .25s}
.q-opt.selected{border-color:var(--accent);background:linear-gradient(135deg,rgba(233,77,154,.1),rgba(168,85,247,.08));color:var(--text)}
.q-opt.selected .radio-dot{border-color:var(--accent);background:var(--accent);box-shadow:0 0 8px rgba(233,77,154,.4)}
.q-opt.selected .radio-dot::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%;background:#fff}
.btn-submit{width:100%;padding:18px;border:none;border-radius:16px;font-size:18px;font-weight:700;color:#fff;background:var(--grad);cursor:pointer;transition:all .3s;box-shadow:var(--shadow);margin-top:12px;letter-spacing:1px}
.btn-submit:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.btn-submit:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(233,77,154,.3)}
.hint{text-align:center;color:#f87171;font-size:13px;margin-top:8px;display:none}

/* RESULT */
.r-header{padding:40px 24px 32px;background:var(--panel);border:1px solid rgba(233,77,154,.15);border-radius:var(--R);margin-bottom:16px;position:relative;overflow:hidden;text-align:center}
.r-header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad)}
.r-label{font-size:13px;color:var(--dim);letter-spacing:2px;margin-bottom:12px}
.r-emoji{font-size:48px;margin-bottom:16px}
.r-name{font-size:32px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.r-group{font-size:15px;color:var(--accent2);font-weight:600;margin-bottom:20px}
.r-code{display:inline-block;background:linear-gradient(135deg,rgba(233,77,154,.15),rgba(168,85,247,.15));border:1px solid rgba(233,77,154,.25);border-radius:12px;padding:8px 20px;font-size:22px;font-weight:900;letter-spacing:3px;color:#f0a0cc;margin-bottom:20px}
.r-match{font-size:15px;font-weight:600;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.r-desc{font-size:14.5px;line-height:1.85;color:var(--dim);text-align:left;padding:0 4px}

.r-box{background:var(--panel);border:1px solid rgba(233,77,154,.1);border-radius:var(--R);padding:24px 20px;margin-bottom:16px}
.r-box h3{font-size:16px;font-weight:700;margin-bottom:18px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}

.dim-row{margin-bottom:16px}.dim-row:last-child{margin-bottom:0}
.dim-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:6px}
.dim-bar-wrap{height:8px;background:rgba(233,77,154,.08);border-radius:4px;overflow:hidden}
.dim-bar{height:100%;border-radius:4px;background:var(--grad);transition:width 1s ease}

.trait-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.trait-tag{display:inline-block;background:linear-gradient(135deg,rgba(233,77,154,.12),rgba(168,85,247,.12));border:1px solid rgba(233,77,154,.2);border-radius:10px;padding:6px 14px;font-size:13px;color:#e0b0d0}

.compat-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(233,77,154,.06);font-size:14px;color:var(--dim)}
.compat-item:last-child{border:none}
.compat-emoji{font-size:20px}
.compat-label{color:var(--accent);font-weight:600;min-width:60px}

.btn-share{width:100%;padding:16px;border:none;border-radius:16px;font-size:16px;font-weight:600;color:#fff;background:var(--grad);cursor:pointer;transition:all .3s;box-shadow:var(--shadow);margin-bottom:10px}
.btn-share:hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(233,77,154,.3)}
.btn-retry{width:100%;padding:16px;border:2px solid rgba(233,77,154,.3);border-radius:16px;font-size:16px;font-weight:600;color:var(--accent);background:transparent;cursor:pointer;transition:all .3s;margin-top:8px}
.btn-retry:hover{background:rgba(233,77,154,.08);border-color:var(--accent)}
.footer{text-align:center;font-size:11px;color:var(--dim);opacity:.4;margin-top:32px;padding-bottom:40px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(233,77,154,.9);color:#fff;padding:10px 24px;border-radius:12px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="shell">

<!-- INTRO -->
<section id="intro" class="screen active">
<div class="intro-card">
  <div class="intro-logo">🎀</div>
  <h1 class="intro-title">KPTI</h1>
  <p class="intro-sub">K-POP TRAINEE IDENTITY</p>
  <div class="intro-desc">
    <strong>你骨子里是哪位 K-Pop 女爱豆？</strong><br><br>
    通过 20 道关于爱豆日常的灵魂拷问，从
    <span class="tag">✨ 舞台气场</span>
    <span class="tag">💃 练舞态度</span>
    <span class="tag">👗 穿搭风格</span>
    <span class="tag">🍎 身材管理</span>
    <span class="tag">🎤 打歌方式</span>
    五大维度，找到你的本命分身。<br><br>
    <strong>张元英、NINGNING、金智秀、金采源、Karina</strong>... 20 位现役顶流女爱豆——<br>
    看看你是谁的精神复制人？💖
  </div>
  <button class="btn-main" onclick="go('test');renderQ()">开 始 测 试 🎵</button>
  <p class="intro-note">⏱ 大约 3 分钟 · 纯属娱乐请勿当真</p>
</div>
</section>

<!-- TEST -->
<section id="test" class="screen">
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
    <div class="progress-text"><span id="pCount">0</span> / 20</div>
  </div>
  <div id="qList"></div>
  <button class="btn-submit" id="btnSub" disabled onclick="submit()">✨ 看看我是谁的分身</button>
  <div class="hint" id="hint">还有题目没答完哦～向上滑动查看 💫</div>
</section>

<!-- RESULT -->
<section id="result" class="screen">
  <div id="rContent"></div>
  <button class="btn-share" onclick="shareResult()">📋 复制结果分享给朋友</button>
  <button class="btn-retry" onclick="retry()">🔄 再测一次</button>
  <p class="footer">KPTI · K-Pop Trainee Identity · 仅供娱乐<br>数据不会上传，放心玩 🎀</p>
</section>

</div>

<div class="toast" id="toast"></div>

<script>
// ===== DIMENSIONS =====
const DIMS={
  ST:{name:'舞台气场',l:'佛系划水',r:'绝对C位'},
  PR:{name:'练舞态度',l:'天赋型选手',r:'地狱特训王'},
  FA:{name:'穿搭风格',l:'舒服至上',r:'时尚先锋'},
  BM:{name:'身材管理',l:'快乐干饭',r:'魔鬼自律'},
  PF:{name:'打歌方式',l:'实力安定',r:'舞台炸裂'}
};
const DO=['ST','PR','FA','BM','PF'];

// ===== 20 QUESTIONS =====
const Q=[
  // ST 1-4
  {id:'q1',dim:'ST',text:'出道舞台，镜头怼到你脸上的那一秒——',opts:[
    {l:'微微一笑就好，自然不做作是我的风格',v:1},
    {l:'嘴角一勾＋眼神杀，这个 fancam 我承包了',v:2},
    {l:'wink + 飞吻 + 比心三连击！今天的热搜是我的',v:3}]},
  {id:'q2',dim:'ST',text:'队友在台上忘词了，全场安静了0.5秒——',opts:[
    {l:'假装没事发生，面带微笑跳自己的 part',v:1},
    {l:'眼神暗示她别慌，悄悄帮忙挡位',v:2},
    {l:'大方接过 mic 即兴 ad-lib，化险为名场面',v:3}]},
  {id:'q3',dim:'ST',text:'粉丝在机场接机举了你的巨幅海报，你？',opts:[
    {l:'害羞低头快步走，但嘴角藏不住笑',v:1},
    {l:'微笑挥手比个心，优雅但不过度',v:2},
    {l:'直接走到海报前合影！还要发 Ins story',v:3}]},
  {id:'q4',dim:'ST',text:'"爱豆最重要的素质是？"你的回答——',opts:[
    {l:'业务能力扎实，唱跳不翻车',v:1},
    {l:'有个人辨识度，一眼就知道是你',v:2},
    {l:'感染力！观众跟着你哭跟着你笑才是真本事',v:3}]},

  // PR 5-8
  {id:'q5',dim:'PR',text:'公司通知下周学全新编舞，难度升级——',opts:[
    {l:'到时候现场跟就行了，我学东西挺快的',v:1},
    {l:'提前把歌听熟，YouTube 上看看类似风格',v:2},
    {l:'已经在扒舞蹈室版本了，明天比老师还熟',v:3}]},
  {id:'q6',dim:'PR',text:'凌晨 2 点，练习室只剩你一个人的灯——',opts:[
    {l:'不可能是我，睡眠是最好的护肤品',v:1},
    {l:'偶尔吧，但练完这段就回去了',v:2},
    {l:'常态。killing part 不完美不准回宿舍',v:3}]},
  {id:'q7',dim:'PR',text:'编舞老师说"这段你们自由发挥"——',opts:[
    {l:'摆几个好看的 pose 就行，freestyle 不是我的强项',v:1},
    {l:'把之前练过的动作拼一下，稳中求进',v:2},
    {l:'掏出昨晚准备的三套方案！A 计划不行还有 B',v:3}]},
  {id:'q8',dim:'PR',text:'看到自己打歌舞台的回放视频——',opts:[
    {l:'看个大概就划走了，人要向前看',v:1},
    {l:'主要关注表情和队形，有啥问题下次注意',v:2},
    {l:'0.5倍速逐帧分析，这个手臂角度差了3度！',v:3}]},

  // FA 9-12
  {id:'q9',dim:'FA',text:'没行程的休息日，下楼买咖啡穿啥？',opts:[
    {l:'卫衣+人字拖，口罩就是我的造型',v:1},
    {l:'简单搭配一下，素颜也要有品味',v:2},
    {l:'Every day is a runway! 全套穿搭+墨镜安排',v:3}]},
  {id:'q10',dim:'FA',text:'造型师拿来一套你觉得巨丑的舞台服——',opts:[
    {l:'穿呗，实力好的话穿麻袋也好看',v:1},
    {l:'委婉提意见，看能不能换个配色',v:2},
    {l:'谢谢，这件我穿不了！打开自己的衣橱开搭',v:3}]},
  {id:'q11',dim:'FA',text:'逛街看到一件超贵但超好看的外套——',opts:[
    {l:'看看就走了，衣服这东西够穿就行',v:1},
    {l:'试一下，如果真的很搭就...咬牙买吧',v:2},
    {l:'看到的那一秒就已经在付款了，好看即正义',v:3}]},
  {id:'q12',dim:'FA',text:'你理想的机场造型是？',opts:[
    {l:'运动套装+大枕头颈枕，实用第一',v:1},
    {l:'简约质感路线，低调但有细节',v:2},
    {l:'每次一套新 look！让站姐拍出时装周大片',v:3}]},

  // BM 13-16
  {id:'q13',dim:'BM',text:'回归前两周，公司下达"饮食管理令"——',opts:[
    {l:'状态好比体重轻重要！该吃吃，开心最重要',v:1},
    {l:'少吃夜宵和甜食，但不至于节食',v:2},
    {l:'已经打开热量记录 APP，鸡胸肉时代正式开启',v:3}]},
  {id:'q14',dim:'BM',text:'深夜直播结束，经纪人偷偷拿来一盒炸鸡——',opts:[
    {l:'不吃对不起炸鸡的香味！直接开造',v:1},
    {l:'吃两块...好吧三块，明天多练一小时抵消',v:2},
    {l:'深情地闻了闻，然后递给旁边的成员。忍！',v:3}]},
  {id:'q15',dim:'BM',text:'同团姐妹在健身房练了 2 小时还在加练——',opts:[
    {l:'佩服佩服！然后继续躺着刷小红书',v:1},
    {l:'有点心虚，要不也去跑步机走 30 分钟？',v:2},
    {l:'那我练 3 小时。这叫 competitive spirit 谢谢',v:3}]},
  {id:'q16',dim:'BM',text:'"身材管理是爱豆基本素养"你怎么看？',opts:[
    {l:'健康比数字重要，爱自己才是真偶像',v:1},
    {l:'适度管理是职业要求，保持状态就好',v:2},
    {l:'完全同意！上镜＋舞台效果，专业的事要认真',v:3}]},

  // PF 17-20
  {id:'q17',dim:'PF',text:'音乐节目 live 最怕什么？',opts:[
    {l:'跑调——所以我每个音都按教科书来',v:1},
    {l:'表情僵硬——技术OK但缺少感染力',v:2},
    {l:'不够炸——安全的 live 不如翻车的 live 有话题',v:3}]},
  {id:'q18',dim:'PF',text:'拿到一首全新的歌，你第一反应——',opts:[
    {l:'循环听三遍，先吃透旋律和调式',v:1},
    {l:'看歌词，想想这首歌要传达什么情绪',v:2},
    {l:'直接进录音室开唱！边唱边感受，现场出灵感',v:3}]},
  {id:'q19',dim:'PF',text:'encore 舞台耳返突然坏了！！！',opts:[
    {l:'跟着队友的声音小声唱，安全第一',v:1},
    {l:'凭肌肉记忆继续，表情管理不能崩',v:2},
    {l:'直接清唱嗨翻全场！真实才是最好的滤镜',v:3}]},
  {id:'q20',dim:'PF',text:'用一句话定义你的舞台哲学——',opts:[
    {l:'"零失误就是最大的诚意"——稳定之神',v:1},
    {l:'"技术之上是情感"——氛围感拿捏',v:2},
    {l:'"每场都当最后一场来燃"——舞台疯子',v:3}]}
];

// ===== 20 MEMBERS =====
// pattern: [ST, PR, FA, BM, PF] each L/M/H
const G=[
  {code:'KPTI-01',name:'张元英',nameEn:'Jang Wonyoung',group:'IVE',emoji:'👑✨',
   pat:['H','M','H','H','M'],
   desc:'你就是"人间Dior"本人！天生 center 气场拉满，站在那里就是画报。练舞认真但不苦大仇深，穿搭品味堪比时尚博主，身材管理严格但你让它看起来毫不费力。你的超能力是——"好像什么都没做就已经很完美了"。',
   tags:['👑 天生Center','🌹 人间Dior','📸 行走画报','✨ 从容碾压'],
   best:'安宥真 (IVE)',worst:'徐彰彬 (3RACHA)'},

  {code:'KPTI-02',name:'NINGNING (宁艺卓)',nameEn:'NINGNING',group:'aespa',emoji:'🎤💜',
   pat:['M','H','M','M','H'],
   desc:'你是开口就封神的 vocal 怪物！练习室待到凌晨只为一个转音更丝滑。舞台上的你不靠花哨的造型，靠的是一嗓子把全场钉住的能力。穿搭佛系但不碍事，你的声音就是最好的配饰。来自中国的你，用实力说话。',

// ===== STATE =====
const ans={};
let lastResult=null;

function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderQ(){
  const el=document.getElementById('qList');
  el.innerHTML=Q.map((q,i)=>`
    <div class="q-card" id="c-${q.id}">
      <div class="q-num">Q${i+1} · ${DIMS[q.dim].name}</div>
      <div class="q-text">${q.text}</div>
      <div class="q-options">
        ${q.opts.map((o,j)=>`
          <label class="q-opt" id="o-${q.id}-${j}" onclick="pick('${q.id}',${o.v},${j})">
            <input type="radio" name="${q.id}" value="${o.v}">
            <span class="radio-dot"></span>
            <span>${o.l}</span>
          </label>`).join('')}
      </div>
    </div>`).join('');
  prog();
}

function pick(qid,val,idx){
  ans[qid]=val;
  Q.find(x=>x.id===qid).opts.forEach((_,j)=>{
    document.getElementById(`o-${qid}-${j}`).classList.toggle('selected',j===idx);
  });
  document.getElementById(`c-${qid}`).classList.add('answered');
  prog();
}

function prog(){
  const n=Object.keys(ans).length;
  document.getElementById('pCount').textContent=n;
  document.getElementById('pFill').style.width=`${(n/20)*100}%`;
  document.getElementById('btnSub').disabled=n<20;
  document.getElementById('hint').style.display='none';
}

function submit(){
  if(Object.keys(ans).length<20){
    document.getElementById('hint').style.display='block';
    const f=Q.find(q=>!ans[q.id]);
    if(f)document.getElementById(`c-${f.id}`).scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  const r=compute();
  lastResult=r;
  render(r);
  go('result');
}

function compute(){
  const sc={};DO.forEach(d=>sc[d]=0);
  Q.forEach(q=>{sc[q.dim]+=(ans[q.id]||0)});
  // 4 questions per dim, range 4-12: 4-6=L, 7-9=M, 10-12=H
  const lv={};
  DO.forEach(d=>{const s=sc[d];lv[d]=s<=6?'L':s<=9?'M':'H'});
  const ln=l=>l==='L'?1:l==='M'?2:3;
  const uv=DO.map(d=>ln(lv[d]));
  const ranked=G.map(g=>{
    const gv=g.pat.map(l=>ln(l));
    const dist=Math.sqrt(gv.reduce((s,v,i)=>s+(v-uv[i])**2,0));
    const mx=Math.sqrt(5*4);
    return{...g,dist,sim:Math.round((1-dist/mx)*100),lv,sc};
  }).sort((a,b)=>a.dist-b.dist);
  return ranked[0];
}

function render(r){
  const el=document.getElementById('rContent');
  el.innerHTML=`
    <div class="r-header">
      <div class="r-label">✨ 你的 K-Pop 分身是</div>
      <div class="r-emoji">${r.emoji}</div>
      <div class="r-name">${r.name}</div>
      <div class="r-group">${r.group}</div>
      <div class="r-code">${r.code}</div>
      <div class="r-match">匹配度 ${r.sim}%</div>
      <div class="r-desc">${r.desc}</div>
    </div>

    <div class="r-box">
      <h3>📊 你的五维雷达</h3>
      ${DO.map(d=>{
        const pct=Math.round(((r.sc[d]-4)/8)*100);
        return`<div class="dim-row">
          <div class="dim-labels"><span>${DIMS[d].l}</span><span>${DIMS[d].name}</span><span>${DIMS[d].r}</span></div>
          <div class="dim-bar-wrap"><div class="dim-bar" style="width:${pct}%"></div></div>
        </div>`;
      }).join('')}
    </div>

    <div class="r-box">
      <h3>🏷️ 你的爱豆标签</h3>
      <div class="trait-tags">${r.tags.map(t=>`<span class="trait-tag">${t}</span>`).join('')}</div>
    </div>

    <div class="r-box">
      <h3>💫 缘分组合</h3>
      <div class="compat-item">
        <span class="compat-emoji">💖</span>
        <span class="compat-label">最佳拍档</span>
        <span>${r.best} — 同框必出名场面</span>
      </div>
      <div class="compat-item">
        <span class="compat-emoji">⚡</span>
        <span class="compat-label">火花CP</span>
        <span>${r.worst} — 风格相反但同台超炸</span>
      </div>
    </div>
  `;
  setTimeout(()=>{
    document.querySelectorAll('.dim-bar').forEach(b=>{b.style.width=b.style.width});
  },100);
}

function shareResult(){
  if(!lastResult) return;
  const r=lastResult;
  const text=`🎀 KPTI 测试结果\n\n我的 K-Pop 分身是：${r.emoji} ${r.name}（${r.group}）\n匹配度：${r.sim}%\n\n${r.tags.join(' ')}\n\n"${r.desc.slice(0,60)}..."\n\n来测测你是谁 👉 ${location.href}`;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>showToast('已复制到剪贴板！发给朋友们吧 💕'));
  }else{
    const ta=document.createElement('textarea');
    ta.value=text;document.body.appendChild(ta);
    ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('已复制到剪贴板！💕');
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function retry(){
  Object.keys(ans).forEach(k=>delete ans[k]);
  lastResult=null;
  go('intro');
}
